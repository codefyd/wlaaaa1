<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ملفات العملاء | نظام ولاء الكافيهات</title>

  <link rel="stylesheet" href="assets/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/config.js"></script>

  <style>
    .customers-layout {
      display: grid;
      gap: 16px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .customers-list {
      display: grid;
      gap: 14px;
    }

    .customer-card {
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 14px 34px rgba(43, 33, 27, 0.08);
    }

    .customer-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .customer-title strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--muted);
      line-height: 1.8;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .mini-stat {
      border-radius: 18px;
      padding: 13px;
      background: rgba(111, 78, 55, 0.06);
      border: 1px solid var(--border);
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .mini-stat strong {
      display: block;
      font-size: 24px;
      color: var(--primary);
      line-height: 1;
    }

    .profile-sections {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .profile-box {
      border-radius: 20px;
      padding: 14px;
      background: rgba(255,255,255,.72);
      border: 1px solid var(--border);
    }

    .profile-box h3 {
      font-size: 17px;
      margin-bottom: 10px;
    }

    .bar-list {
      display: grid;
      gap: 9px;
    }

    .bar-row {
      display: grid;
      gap: 5px;
    }

    .bar-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
    }

    .bar-track {
      height: 9px;
      background: rgba(111, 78, 55, 0.11);
      border-radius: 99px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 99px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(111, 78, 55, 0.1);
      color: var(--primary);
      white-space: nowrap;
    }

    .pill.success {
      color: var(--success);
      background: rgba(47, 133, 90, 0.1);
    }

    .pill.danger {
      color: var(--danger);
      background: rgba(180, 35, 24, 0.1);
    }

    .pager {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .empty-state {
      padding: 20px;
      border-radius: 22px;
      background: rgba(111, 78, 55, 0.06);
      border: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
    }

    @media (max-width: 1050px) {
      .profile-sections {
        grid-template-columns: 1fr;
      }

      .mini-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 650px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .customer-head {
        flex-direction: column;
      }

      .mini-grid {
        grid-template-columns: 1fr;
      }

      .customer-card {
        border-radius: 22px;
        padding: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>ملفات العملاء</h1>
        <p id="merchantInfo" class="subtitle" style="margin-bottom:0;">
          جاري تحميل بيانات العملاء...
        </p>
      </div>

      <nav class="nav">
        <a href="cashier.html">الكاشير</a>
        <a href="customers.html">العملاء</a>
        <a href="analytics.html">التحليلات</a>
        <a href="settings.html">الإعدادات</a>
        <a href="#" id="logoutLink">تسجيل الخروج</a>
      </nav>
    </header>

    <section class="customers-layout">
      <div class="card">
        <form id="searchForm" class="toolbar">
          <div class="form-group" style="margin-bottom:0;">
            <label for="searchInput">بحث في العملاء</label>
            <input id="searchInput" type="search" placeholder="ابحث بالاسم أو رقم الجوال" />
          </div>

          <button id="searchBtn" type="submit">بحث</button>
        </form>
      </div>

      <section id="loadingCard" class="card">
        <h2>جاري تحميل ملفات العملاء...</h2>
        <p class="muted">نجهز لك سلوك كل عميل حسب الأيام والأوقات وفترات الشهر.</p>
      </section>

      <section id="errorCard" class="card" style="display:none;">
        <h2>تعذر تحميل العملاء</h2>
        <p id="errorText" class="muted">حدث خطأ غير معروف.</p>
      </section>

      <section id="content" style="display:none;">
        <div id="customersList" class="customers-list"></div>

        <div class="pager" style="margin-top:18px;">
          <button id="prevBtn" class="secondary" type="button">السابق</button>
          <button id="nextBtn" type="button">التالي</button>
        </div>
      </section>
    </section>
  </main>

  <script>
    const client = window.supabase.createClient(
      window.APP_CONFIG.SUPABASE_URL,
      window.APP_CONFIG.SUPABASE_PUBLISHABLE_KEY
    );

    const merchantInfo = document.getElementById("merchantInfo");
    const logoutLink = document.getElementById("logoutLink");

    const searchForm = document.getElementById("searchForm");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");

    const loadingCard = document.getElementById("loadingCard");
    const errorCard = document.getElementById("errorCard");
    const errorText = document.getElementById("errorText");
    const content = document.getElementById("content");
    const customersList = document.getElementById("customersList");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentOffset = 0;
    let currentLimit = 30;
    let totalRows = 0;
    let currentSearch = "";

    function n(value) {
      return Number(value || 0);
    }

    function fmt(value) {
      return new Intl.NumberFormat("ar-SA").format(n(value));
    }

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(dateValue) {
      if (!dateValue) return "-";

      try {
        return new Intl.DateTimeFormat("ar-SA", {
          dateStyle: "medium",
          timeStyle: "short"
        }).format(new Date(dateValue));
      } catch (e) {
        return dateValue;
      }
    }

    function applyTheme(merchant) {
      document.documentElement.style.setProperty("--primary", merchant.primary_color || "#6F4E37");
      document.documentElement.style.setProperty("--secondary", merchant.secondary_color || "#C8A27A");
      document.documentElement.style.setProperty("--bg", merchant.background_color || "#F7F1EA");
      document.documentElement.style.setProperty("--surface", merchant.surface_color || "#FFFFFF");
      document.documentElement.style.setProperty("--text", merchant.text_color || "#2B211B");
    }

    async function requireSession() {
      const { data } = await client.auth.getSession();

      if (!data.session) {
        window.location.href = "login.html";
        return false;
      }

      return true;
    }

    function showError(text) {
      loadingCard.style.display = "none";
      content.style.display = "none";
      errorCard.style.display = "block";
      errorText.textContent = text || "تعذر تحميل ملفات العملاء.";
    }

    function phoneStatusPill(status) {
      if (status === "valid") {
        return '<span class="pill success">رقم صحيح</span>';
      }

      if (status === "empty") {
        return '<span class="pill danger">رقم فارغ</span>';
      }

      return '<span class="pill danger">رقم غير صحيح</span>';
    }

    function verifiedPill(value) {
      return value
        ? '<span class="pill success">واتساب موثق</span>'
        : '<span class="pill">واتساب غير موثق</span>';
    }

    function bestLabel(items) {
      if (!items || items.length === 0) return "-";

      const best = [...items].sort((a, b) => n(b.visits) - n(a.visits))[0];

      if (!best || n(best.visits) === 0) return "-";

      return best.label;
    }

    function barsHtml(items) {
      const list = Array.isArray(items) ? items : [];
      const maxValue = Math.max(...list.map((x) => n(x.visits)), 1);

      if (list.length === 0) {
        return '<div class="empty-state">لا توجد بيانات.</div>';
      }

      return `
        <div class="bar-list">
          ${list.map((item) => {
            const visits = n(item.visits);
            const percent = Math.round((visits / maxValue) * 100);

            return `
              <div class="bar-row">
                <div class="bar-head">
                  <span>${esc(item.label)}</span>
                  <span>${fmt(visits)} زيارة</span>
                </div>
                <div class="bar-track">
                  <div class="bar-fill" style="width:${percent}%"></div>
                </div>
                <div class="muted" style="font-size:12px;">الأكواب: ${fmt(item.cups)}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderCustomers(items) {
      customersList.innerHTML = "";

      if (!items || items.length === 0) {
        customersList.innerHTML = '<div class="empty-state">لا توجد ملفات عملاء مطابقة.</div>';
        return;
      }

      items.forEach((customer) => {
        const bestDay = bestLabel(customer.weekday_stats);
        const bestTime = bestLabel(customer.time_bucket_stats);
        const bestMonthPeriod = bestLabel(customer.month_day_bucket_stats);

        const card = document.createElement("article");
        card.className = "customer-card";

        card.innerHTML = `
          <div class="customer-head">
            <div class="customer-title">
              <strong>${esc(customer.name || "عميل بدون اسم")}</strong>
              <div class="muted">${esc(customer.phone || "-")}</div>
            </div>

            <div style="display:flex;gap:7px;flex-wrap:wrap;">
              ${phoneStatusPill(customer.phone_status)}
              ${verifiedPill(customer.whatsapp_verified)}
            </div>
          </div>

          <div class="mini-grid">
            <div class="mini-stat">
              <span>عدد الزيارات</span>
              <strong>${fmt(customer.visits_count)}</strong>
            </div>

            <div class="mini-stat">
              <span>إجمالي الأكواب</span>
              <strong>${fmt(customer.total_cups)}</strong>
            </div>

            <div class="mini-stat">
              <span>المكافآت المتاحة</span>
              <strong>${fmt(customer.available_rewards)}</strong>
            </div>

            <div class="mini-stat">
              <span>آخر زيارة</span>
              <strong style="font-size:16px;line-height:1.5;">${formatDate(customer.last_visit_at)}</strong>
            </div>
          </div>

          <div class="mini-grid">
            <div class="mini-stat">
              <span>أكثر يوم زيارة</span>
              <strong style="font-size:18px;">${esc(bestDay)}</strong>
            </div>

            <div class="mini-stat">
              <span>أكثر وقت زيارة</span>
              <strong style="font-size:18px;">${esc(bestTime)}</strong>
            </div>

            <div class="mini-stat">
              <span>أقوى فترة بالشهر</span>
              <strong style="font-size:18px;">${esc(bestMonthPeriod)}</strong>
            </div>

            <div class="mini-stat">
              <span>أول زيارة</span>
              <strong style="font-size:16px;line-height:1.5;">${formatDate(customer.first_visit_at)}</strong>
            </div>
          </div>

          <div class="profile-sections">
            <div class="profile-box">
              <h3>الزيارات حسب الأيام</h3>
              ${barsHtml(customer.weekday_stats)}
            </div>

            <div class="profile-box">
              <h3>الزيارات حسب الأوقات</h3>
              ${barsHtml(customer.time_bucket_stats)}
            </div>

            <div class="profile-box">
              <h3>الزيارات حسب فترات الشهر</h3>
              ${barsHtml(customer.month_day_bucket_stats)}
            </div>
          </div>
        `;

        customersList.appendChild(card);
      });
    }

    function updatePager() {
      prevBtn.disabled = currentOffset <= 0;
      nextBtn.disabled = currentOffset + currentLimit >= totalRows;
    }

    async function loadCustomers() {
      const ok = await requireSession();
      if (!ok) return;

      loadingCard.style.display = "block";
      errorCard.style.display = "none";
      content.style.display = "none";

      searchBtn.disabled = true;
      searchBtn.textContent = "جاري البحث...";

      const { data, error } = await client.rpc("get_customer_profiles", {
        p_search: currentSearch || null,
        p_limit: currentLimit,
        p_offset: currentOffset
      });

      searchBtn.disabled = false;
      searchBtn.textContent = "بحث";

      if (error) {
        showError(error.message || "تعذر تحميل ملفات العملاء.");
        return;
      }

      if (!data || data.ok === false) {
        showError(data?.message || "تعذر تحميل ملفات العملاء.");
        return;
      }

      applyTheme(data.merchant || {});
      merchantInfo.textContent = (data.merchant?.name || "الكافيه") + " — ملفات العملاء";

      totalRows = n(data.paging?.total);

      renderCustomers(data.customers || []);
      updatePager();

      loadingCard.style.display = "none";
      errorCard.style.display = "none";
      content.style.display = "block";
    }

    searchForm.addEventListener("submit", (e) => {
      e.preventDefault();
      currentSearch = searchInput.value.trim();
      currentOffset = 0;
      loadCustomers();
    });

    prevBtn.addEventListener("click", () => {
      currentOffset = Math.max(0, currentOffset - currentLimit);
      loadCustomers();
    });

    nextBtn.addEventListener("click", () => {
      if (currentOffset + currentLimit < totalRows) {
        currentOffset += currentLimit;
        loadCustomers();
      }
    });

    logoutLink.addEventListener("click", async (e) => {
      e.preventDefault();
      await client.auth.signOut();
      window.location.href = "login.html";
    });

    loadCustomers();
  </script>
</body>
</html>
